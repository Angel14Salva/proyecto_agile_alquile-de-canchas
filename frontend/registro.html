<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear cuenta — Pacific Sport Center</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body class="login-page">
<div class="login-wrap">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">⚽</div>
      <h1>Crear cuenta</h1>
      <p>Pacific Sport Center</p>
    </div>

    <div id="alert" class="alert hidden"></div>

    <form id="registroForm">
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" id="nombre" placeholder="Tu nombre completo" required>
      </div>
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="email" placeholder="tu@correo.com" required>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 8 caracteres" required minlength="8">
      </div>
      <div class="form-group">
        <label>DNI</label>
        <input type="text" id="dni" placeholder="12345678" required pattern="[0-9]{8}" maxlength="8" inputmode="numeric">
      </div>
      <div class="form-group">
        <label>Teléfono <span style="font-weight:400;color:#888">(opcional)</span></label>
        <input type="text" id="telefono" placeholder="999000000">
      </div>
      <button type="submit" class="btn-primary btn-full" id="btnRegistro">Crear cuenta</button>
    </form>

    <div class="login-links" style="justify-content:center;margin-top:14px">
      <a href="login.html">← Volver al login</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  if (api.isLoggedIn()) window.location.href = 'dashboard.html';

  const DNI_RE   = /^[0-9]{8}$/;
  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  document.getElementById('registroForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn    = document.getElementById('btnRegistro');
    const alerta = document.getElementById('alert');
    const nombre   = document.getElementById('nombre').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const dni      = document.getElementById('dni').value.trim();
    const telefono = document.getElementById('telefono').value.trim();

    alerta.className = 'alert hidden';

    if (!nombre)  { alerta.textContent = 'El nombre completo es requerido';       alerta.className = 'alert alert-error'; return; }
    if (!dni)     { alerta.textContent = 'El DNI es requerido';                   alerta.className = 'alert alert-error'; return; }
    if (!DNI_RE.test(dni)) { alerta.textContent = 'El DNI debe tener exactamente 8 dígitos numéricos'; alerta.className = 'alert alert-error'; return; }
    if (!email)   { alerta.textContent = 'El correo es requerido';                alerta.className = 'alert alert-error'; return; }
    if (!EMAIL_RE.test(email)) { alerta.textContent = 'Ingresa un correo electrónico válido'; alerta.className = 'alert alert-error'; return; }
    if (!password){ alerta.textContent = 'La contraseña es requerida';            alerta.className = 'alert alert-error'; return; }
    if (password.length < 8) { alerta.textContent = 'La contraseña debe tener mínimo 8 caracteres'; alerta.className = 'alert alert-error'; return; }

    btn.textContent = 'Creando cuenta...';
    btn.disabled = true;

    try {
      await api.post('/api/auth/register', {
        nombre, email, password, dni,
        telefono: telefono || null,
      }, false);

      alerta.textContent = '✅ Cuenta creada correctamente. Redirigiendo al inicio de sesión...';
      alerta.className = 'alert alert-success';
      setTimeout(() => window.location.href = 'login.html?registered=1', 2000);

    } catch(err) {
      alerta.textContent = err.message;
      alerta.className = 'alert alert-error';
      btn.textContent = 'Crear cuenta';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
