<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis cupones — Pacific Sport Center</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="app-layout">
  <header class="topbar">
    <a href="dashboard.html" class="topbar-logo">
      <div class="topbar-logo-icon">⚽</div>
      <span class="topbar-name">Pacific Sport Center</span>
    </a>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="topbar-btn" onclick="api.logout()">Salir</button>
    </div>
  </header>
  <div class="main-wrap">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content">
      <div class="page-header">
        <div>
          <div class="page-title">Mis cupones</div>
          <div class="page-sub">Administra y visualiza tus cupones de reembolso generados por cancelaciones.</div>
        </div>
      </div>
      <div id="alert" class="alert hidden" style="margin-bottom:16px"></div>
      <div class="card">
        <div class="card-title">Tus cupones de reembolso</div>
        <div id="tablaCupones"><div class="loading"><span class="spinner"></span>Cargando cupones...</div></div>
      </div>
    </main>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script>
  requireAuth();
  requireRole('cliente');
  renderSidebar('mis-cupones');
  document.getElementById('topbarUser').textContent = `👤 ${api.getUsuario().nombre}`;

  async function cargar() {
    try {
      const cupones = await api.get('/api/cupones');
      renderTabla(cupones);
    } catch(err) {
      document.getElementById('tablaCupones').innerHTML = `<p style="color:var(--red)">${err.message}</p>`;
    }
  }

  function renderTabla(lista) {
    if (lista.length === 0) {
      document.getElementById('tablaCupones').innerHTML = '<div class="empty"><div class="empty-icon">🎫</div>No tienes cupones de reembolso generados aún</div>';
      return;
    }

    const badgeEstado = (e) => {
      const m = { activo:'badge-green', agotado:'badge-gray', anulado:'badge-red' };
      return `<span class="badge ${m[e]||'badge-gray'}">${e}</span>`;
    };

    document.getElementById('tablaCupones').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Código de Cupón</th>
            <th>Reserva Origen</th>
            <th>Valor Inicial</th>
            <th>Saldo Disponible</th>
            <th>Estado</th>
            <th>Motivo de Reembolso</th>
            <th>Fecha Emisión</th>
          </tr>
        </thead>
        <tbody>
          ${lista.map(c => `
            <tr>
              <td><strong style="font-size:12px;color:#16a34a;background:#e8f5e9;padding:4px 8px;border-radius:4px;font-family:monospace">${c.codigo}</strong></td>
              <td><code style="font-size:11px;background:#f5f5f5;padding:2px 6px;border-radius:4px">${c.reserva_codigo||'—'}</code></td>
              <td>S/ ${parseFloat(c.valor_inicial).toFixed(2)}</td>
              <td><strong style="color:${parseFloat(c.saldo) > 0 ? '#1b5e20' : '#757575'}">S/ ${parseFloat(c.saldo).toFixed(2)}</strong></td>
              <td>${badgeEstado(c.estado)}</td>
              <td style="font-size:12px;color:#555">${c.motivo}</td>
              <td style="font-size:12px;color:#666">${String(c.created_at).substring(0,10)} ${String(c.created_at).substring(11,16)}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  cargar();
</script>
</body>
</html>
