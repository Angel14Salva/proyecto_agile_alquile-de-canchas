<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de caja — Pacific Sport Center</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="app-layout">
  <header class="topbar">
    <a href="dashboard.html" class="topbar-logo">
      <div class="topbar-logo-icon">⚽</div>
      <span class="topbar-name">Pacific Sport Center</span>
    </a>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="topbar-btn" onclick="api.logout()">Salir</button>
    </div>
  </header>
  <div class="main-wrap">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content">
      <div class="page-header">
        <div>
          <div class="page-title">Control de caja</div>
          <div class="page-sub">Historial de aperturas y cierres de caja de recepción.</div>
        </div>
      </div>
      <div id="alert" class="alert hidden" style="margin-bottom:16px"></div>
      
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
          <div class="card-title" style="margin:0">Cierres de caja (Últimos 30 turnos)</div>
          <button class="btn-secondary" onclick="cargar()" style="margin:0;padding:6px 12px;font-size:12px">🔄 Actualizar</button>
        </div>
        <div id="tablaCaja"><div class="loading"><span class="spinner"></span>Cargando historial de caja...</div></div>
      </div>
    </main>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script>
  requireAuth();
  requireRole('admin');
  renderSidebar('control-caja-admin');
  document.getElementById('topbarUser').textContent = `👤 ${api.getUsuario().nombre}`;

  async function cargar() {
    try {
      const historial = await api.get('/api/caja/historial');
      renderTabla(historial);
    } catch(err) {
      document.getElementById('tablaCaja').innerHTML = `<p style="color:var(--red)">${err.message}</p>`;
    }
  }

  function renderTabla(lista) {
    if (lista.length === 0) {
      document.getElementById('tablaCaja').innerHTML = '<div class="empty"><div class="empty-icon">💵</div>No hay cierres de caja registrados en el sistema</div>';
      return;
    }

    const formatoFecha = (f) => {
      if (!f) return '—';
      const d = new Date(f);
      return d.toLocaleDateString('es-PE', { day:'2-digit', month:'2-digit', year:'numeric' }) + ' ' + d.toLocaleTimeString('es-PE', { hour:'2-digit', minute:'2-digit' });
    };

    document.getElementById('tablaCaja').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Turno</th>
            <th>Apertura (Usuario / Fecha / Inicial)</th>
            <th>Cierre (Usuario / Fecha)</th>
            <th>Efectivo Esperado</th>
            <th>Efectivo Contado</th>
            <th>Diferencia / Cuadre</th>
            <th>Observaciones / Notas</th>
          </tr>
        </thead>
        <tbody>
          ${lista.map(c => {
            const dif = parseFloat(c.diferencia || 0);
            let difBadge = '';
            if (dif === 0) {
              difBadge = '<span class="badge badge-green">S/ 0.00 ✅ Cuadrado</span>';
            } else if (dif < 0) {
              difBadge = `<span class="badge badge-red">S/ ${dif.toFixed(2)} ❌ Faltante</span>`;
            } else {
              difBadge = `<span class="badge badge-amber">+S/ ${dif.toFixed(2)} ⚠️ Sobrante</span>`;
            }

            return `
              <tr>
                <td><strong>#${c.id}</strong></td>
                <td>
                  <div style="font-weight:600">${c.abierta_por_nombre}</div>
                  <div style="font-size:11px;color:#666">${formatoFecha(c.abierta_at)}</div>
                  <div style="font-size:11px;color:#2e7d32">Inicial: S/ ${parseFloat(c.monto_inicial).toFixed(2)}</div>
                </td>
                <td>
                  <div style="font-weight:600">${c.cerrada_por_nombre || '—'}</div>
                  <div style="font-size:11px;color:#666">${formatoFecha(c.cerrada_at)}</div>
                </td>
                <td><strong>S/ ${parseFloat(c.efectivo_esperado || 0).toFixed(2)}</strong></td>
                <td><strong>S/ ${parseFloat(c.efectivo_contado || 0).toFixed(2)}</strong></td>
                <td>${difBadge}</td>
                <td style="font-size:12px;color:#555;max-width:200px;word-wrap:break-word">${c.notas_cierre || '—'}</td>
              </tr>`;
          }).join('')}
        </tbody>
      </table>`;
  }

  cargar();
</script>
</body>
</html>
