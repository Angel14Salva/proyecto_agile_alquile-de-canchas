<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva contraseña — Pacific Sport Center</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body class="login-page">
<div class="login-wrap">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">🔒</div>
      <h1>Nueva contraseña</h1>
      <p>Ingresa tu nueva contraseña</p>
    </div>
    <div id="alert" class="alert hidden"></div>
    <div class="form-group">
      <label>Nueva contraseña</label>
      <input type="password" id="password" placeholder="Mínimo 8 caracteres">
    </div>
    <div class="form-group">
      <label>Confirmar contraseña</label>
      <input type="password" id="password2" placeholder="Repite la contraseña">
    </div>
    <button class="btn-primary btn-full" onclick="resetear()" id="btn">Cambiar contraseña</button>
    <div class="login-links" style="margin-top:16px">
      <a href="index.html">← Volver al inicio de sesión</a>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script>
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    document.getElementById('alert').textContent = '❌ Token inválido. Solicita un nuevo enlace.';
    document.getElementById('alert').className = 'alert alert-error';
    document.getElementById('btn').disabled = true;
  }
  async function resetear() {
    const password  = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    const alerta    = document.getElementById('alert');
    const btn       = document.getElementById('btn');
    if (password.length < 8) { alerta.textContent='Mínimo 8 caracteres'; alerta.className='alert alert-error'; return; }
    if (password !== password2) { alerta.textContent='Las contraseñas no coinciden'; alerta.className='alert alert-error'; return; }
    btn.textContent='Cambiando...'; btn.disabled=true;
    try {
      await api.post('/api/auth/reset-password', { token, password }, false);
      alerta.textContent='✅ Contraseña actualizada correctamente. Redirigiendo...';
      alerta.className='alert alert-success';
      setTimeout(() => window.location.href='index.html', 2000);
    } catch(err) {
      alerta.textContent=err.message; alerta.className='alert alert-error';
      btn.textContent='Cambiar contraseña'; btn.disabled=false;
    }
  }
</script>
</body>
</html>
