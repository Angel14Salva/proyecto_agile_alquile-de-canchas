<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Pacific Sport Center</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="app-layout">

  <!-- TOPBAR -->
  <header class="topbar">
    <a href="dashboard.html" class="topbar-logo">
      <div class="topbar-logo-icon">⚽</div>
      <span class="topbar-name">Pacific Sport Center</span>
    </a>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="topbar-btn" onclick="api.logout()">Salir</button>
    </div>
  </header>

  <div class="main-wrap">
    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar"></nav>

    <!-- CONTENIDO -->
    <main class="content">
      <div class="page-header">
        <div>
          <div class="page-title">Dashboard</div>
          <div class="page-sub" id="fechaHoy"></div>
        </div>
        <a href="reservar.html" class="btn-primary">+ Nueva reserva</a>
      </div>

      <!-- MÉTRICAS -->
      <div class="grid4" style="margin-bottom:16px">
        <div class="metric"><div class="metric-val" id="mReservasHoy">—</div><div class="metric-lbl">Reservas hoy</div><div class="metric-tag">Hoy</div></div>
        <div class="metric"><div class="metric-val" id="mIngresos">—</div><div class="metric-lbl">Ingresos hoy</div><div class="metric-tag">Estimado</div></div>
        <div class="metric"><div class="metric-val" id="mCanchas">—</div><div class="metric-lbl">Canchas activas</div></div>
        <div class="metric"><div class="metric-val" id="mPendientes">—</div><div class="metric-lbl">Pendientes pago</div></div>
      </div>

      <div class="grid2">
        <!-- PRÓXIMAS RESERVAS -->
        <div class="card">
          <div class="card-title">📋 Reservas de hoy</div>
          <div id="reservasHoy"><div class="loading"><span class="spinner"></span>Cargando...</div></div>
        </div>

        <!-- ESTADO CANCHAS -->
        <div class="card">
          <div class="card-title">⚽ Estado de canchas</div>
          <div id="estadoCanchas"><div class="loading"><span class="spinner"></span>Cargando...</div></div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script>
  requireAuth();
  renderSidebar('dashboard');

  const usuario = api.getUsuario();
  document.getElementById('topbarUser').textContent = `👤 ${usuario.nombre}`;

  const hoy = new Date();
  document.getElementById('fechaHoy').textContent = hoy.toLocaleDateString('es-PE', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  async function cargarDashboard() {
    try {
      const fechaHoy = hoy.toISOString().split('T')[0];

      // Reservas de hoy
      const reservas = await api.get(`/api/reservas?fecha=${fechaHoy}`);
      const pendientes = reservas.filter(r => r.pago_estado !== 'pagado');

      document.getElementById('mReservasHoy').textContent = reservas.length;
      document.getElementById('mPendientes').textContent = pendientes.length;

      const ingresos = reservas.filter(r => r.pago_estado === 'pagado')
        .reduce((sum, r) => sum + parseFloat(r.precio_hora || 0), 0);
      document.getElementById('mIngresos').textContent = `S/ ${ingresos.toFixed(2)}`;

      // Tabla de reservas
      if (reservas.length === 0) {
        document.getElementById('reservasHoy').innerHTML = '<div class="empty"><div class="empty-icon">📭</div>No hay reservas para hoy</div>';
      } else {
        document.getElementById('reservasHoy').innerHTML = `
          <table>
            <thead><tr><th>Hora</th><th>Cancha</th><th>Cliente</th><th>Estado</th></tr></thead>
            <tbody>
              ${reservas.map(r => `
                <tr>
                  <td><strong>${r.hora_inicio?.substring(0,5)}</strong></td>
                  <td>${r.cancha_nombre}</td>
                  <td>${r.cliente_nombre}</td>
                  <td>${badgeEstado(r.estado)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>`;
      }

      // Canchas
      const canchas = await api.get('/api/canchas', false);
      document.getElementById('mCanchas').textContent = canchas.length;

      document.getElementById('estadoCanchas').innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px">
          ${canchas.map(c => `
            <div style="padding:8px 10px;border-radius:7px;background:var(--green-light);border:1px solid var(--green-border)">
              <div style="font-size:12px;font-weight:600;color:var(--green)">${c.nombre}</div>
              <div style="font-size:11px;color:var(--green);margin-top:1px">S/ ${parseFloat(c.precio_hora).toFixed(2)}/hr</div>
            </div>
          `).join('')}
        </div>`;

    } catch (err) {
      console.error(err);
    }
  }

  function badgeEstado(estado) {
    const map = { confirmada:'badge-green', pendiente:'badge-amber', cancelada:'badge-red', completada:'badge-gray' };
    return `<span class="badge ${map[estado] || 'badge-gray'}">${estado}</span>`;
  }

  cargarDashboard();
</script>
</body>
</html>
