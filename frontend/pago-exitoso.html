<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago exitoso — Pacific Sport Center</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f6f3">
  <div style="background:white;border-radius:16px;padding:40px;max-width:480px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.1)">
    <div id="loadingMsg">
      <div class="spinner" style="margin:0 auto 16px"></div>
      <p>Confirmando tu pago...</p>
    </div>
    <div id="successMsg" style="display:none">
      <div style="font-size:64px;margin-bottom:16px">✅</div>
      <h2 style="color:#16a34a;margin-bottom:8px">¡Pago exitoso!</h2>
      <p style="color:#666;margin-bottom:8px">Tu reserva ha sido confirmada.</p>
      <p id="codigoReserva" style="font-weight:700;font-size:18px;color:#1a2e1d;margin-bottom:24px"></p>
      <p style="color:#666;font-size:13px;margin-bottom:24px">Te enviamos un correo de confirmación con los detalles.</p>
      <a href="mis-reservas.html" class="btn-primary" style="display:inline-block;padding:12px 28px;background:#16a34a;color:white;border-radius:8px;text-decoration:none;font-weight:600">Ver mis reservas</a>
    </div>
    <div id="errorMsg" style="display:none">
      <div style="font-size:64px;margin-bottom:16px">❌</div>
      <h2 style="color:#dc2626;margin-bottom:8px">Error al confirmar</h2>
      <p style="color:#666;margin-bottom:24px">No pudimos confirmar tu pago. Contáctanos si el problema persiste.</p>
      <a href="mis-reservas.html" class="btn-primary" style="display:inline-block;padding:12px 28px;background:#16a34a;color:white;border-radius:8px;text-decoration:none;font-weight:600">Ver mis reservas</a>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const reservaId = params.get('reserva');
  const token = params.get('token');

  async function confirmarPago() {
    try {
      const authData = api.getUsuario();
      if (!authData) { window.location.href = 'login.html'; return; }

      const res = await api.post('/api/pagos/flow/retorno', {
        token: token,
        reserva_id: parseInt(reservaId)
      });

      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
      document.getElementById('codigoReserva').textContent = 'Reserva #' + reservaId;
    } catch(e) {
      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('errorMsg').style.display = 'block';
    }
  }

  confirmarPago();
</script>
</body>
</html>
