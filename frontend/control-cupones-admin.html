<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de cupones — Pacific Sport Center</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="app-layout">
  <header class="topbar">
    <a href="dashboard.html" class="topbar-logo">
      <div class="topbar-logo-icon">⚽</div>
      <span class="topbar-name">Pacific Sport Center</span>
    </a>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="topbar-btn" onclick="api.logout()">Salir</button>
    </div>
  </header>
  <div class="main-wrap">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content">
      <div class="page-header">
        <div>
          <div class="page-title">Control de cupones</div>
          <div class="page-sub">Auditoría de cupones generados únicamente por el personal de recepción (cancelaciones presenciales).</div>
        </div>
      </div>
      <div id="alert" class="alert hidden" style="margin-bottom:16px"></div>
      
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
          <div class="card-title" style="margin:0">Cupones Generados en Recepción</div>
          <button class="btn-secondary" onclick="cargar()" style="margin:0;padding:6px 12px;font-size:12px">🔄 Actualizar</button>
        </div>
        <div id="tablaCupones"><div class="loading"><span class="spinner"></span>Cargando cupones de recepción...</div></div>
      </div>
    </main>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script>
  requireAuth();
  requireRole('admin');
  renderSidebar('control-cupones-admin');
  document.getElementById('topbarUser').textContent = `👤 ${api.getUsuario().nombre}`;

  async function cargar() {
    try {
      const cupones = await api.get('/api/cupones/admin/recepcion');
      renderTabla(cupones);
    } catch(err) {
      document.getElementById('tablaCupones').innerHTML = `<p style="color:var(--red)">${err.message}</p>`;
    }
  }

  function renderTabla(lista) {
    if (lista.length === 0) {
      document.getElementById('tablaCupones').innerHTML = '<div class="empty"><div class="empty-icon">🎟️</div>No hay cupones de recepción registrados</div>';
      return;
    }

    const badgeEstado = (e) => {
      const m = { activo:'badge-green', agotado:'badge-gray', anulado:'badge-red' };
      return `<span class="badge ${m[e]||'badge-gray'}">${e}</span>`;
    };

    const formatoFecha = (f) => {
      if (!f) return '—';
      const d = new Date(f);
      return d.toLocaleDateString('es-PE', { day:'2-digit', month:'2-digit', year:'numeric' }) + ' ' + d.toLocaleTimeString('es-PE', { hour:'2-digit', minute:'2-digit' });
    };

    document.getElementById('tablaCupones').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Código de Cupón</th>
            <th>Generado por (Recepcionista)</th>
            <th>Reserva Origen</th>
            <th>Valor Inicial</th>
            <th>Saldo Disponible</th>
            <th>Estado</th>
            <th>Motivo de Emisión</th>
            <th>Fecha Registro</th>
          </tr>
        </thead>
        <tbody>
          ${lista.map(c => `
            <tr>
              <td><strong style="font-size:12px;color:#1e3a8a;background:#eff6ff;padding:4px 8px;border-radius:4px;font-family:monospace;border:1px solid #bfdbfe">${c.codigo}</strong></td>
              <td><strong style="color:#1e3a8a">${c.recepcionista_nombre}</strong></td>
              <td><code style="font-size:11px;background:#f5f5f5;padding:2px 6px;border-radius:4px">${c.reserva_codigo||'—'}</code></td>
              <td>S/ ${parseFloat(c.valor_inicial).toFixed(2)}</td>
              <td><strong style="color:${parseFloat(c.saldo) > 0 ? '#16a34a' : '#666'}">S/ ${parseFloat(c.saldo).toFixed(2)}</strong></td>
              <td>${badgeEstado(c.estado)}</td>
              <td style="font-size:12px;color:#555;max-width:180px;word-wrap:break-word">${c.motivo || '—'}</td>
              <td style="font-size:11px;color:#666">${formatoFecha(c.created_at)}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  cargar();
</script>
</body>
</html>
