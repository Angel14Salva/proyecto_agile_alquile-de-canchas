<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canchas — Pacific Sport Center</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="app-layout">
  <header class="topbar">
    <a href="dashboard.html" class="topbar-logo">
      <div class="topbar-logo-icon">⚽</div>
      <span class="topbar-name">Pacific Sport Center</span>
    </a>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="topbar-btn" onclick="api.logout()">Salir</button>
    </div>
  </header>

  <div class="main-wrap">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content">
      <div class="page-header">
        <div>
          <div class="page-title">Canchas deportivas</div>
          <div class="page-sub" id="subtitulo">Cargando...</div>
        </div>
        <div style="display:flex;gap:8px">
          <select id="filtroDeporte" onchange="filtrar()">
            <option value="">Todos los deportes</option>
            <option value="futbol">⚽ Fútbol</option>
            <option value="basketball">🏀 Basketball</option>
            <option value="volleyball">🏐 Volleyball</option>
          </select>
        </div>
      </div>

      <div id="alert" class="alert hidden"></div>
      <div class="grid3" id="canchasGrid">
        <div class="loading"><span class="spinner"></span>Cargando canchas...</div>
      </div>
    </main>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script>
  requireAuth();
  renderSidebar('canchas');

  const usuario = api.getUsuario();
  const rol     = usuario?.rol;
  document.getElementById('topbarUser').textContent = `👤 ${usuario.nombre}`;

  const esAdmin   = rol === 'admin';
  const iconos    = { futbol:'⚽', basketball:'🏀', volleyball:'🏐' };
  let todasCanchas = [];

  async function cargar() {
    try {
      todasCanchas = await api.get('/api/canchas', false);
      document.getElementById('subtitulo').textContent = `${todasCanchas.length} canchas registradas`;
      filtrar();
    } catch(err) {
      document.getElementById('canchasGrid').innerHTML = `<p style="color:var(--red)">${err.message}</p>`;
    }
  }

  function filtrar() {
    const deporte = document.getElementById('filtroDeporte').value;
    const lista   = deporte ? todasCanchas.filter(c => c.deporte === deporte) : todasCanchas;
    renderCanchas(lista);
  }

  function renderCanchas(canchas) {
    if (canchas.length === 0) {
      document.getElementById('canchasGrid').innerHTML =
        '<div class="empty"><div class="empty-icon">⚽</div>No hay canchas disponibles</div>';
      return;
    }

    document.getElementById('canchasGrid').innerHTML = canchas.map(c => `
      <div class="cancha-card">
        <div class="cancha-thumb">${iconos[c.deporte]||'🏟️'}</div>
        <div class="cancha-name">${c.nombre}</div>
        <div class="cancha-price">S/ ${parseFloat(c.precio_hora).toFixed(2)} / hora</div>
        <div class="cancha-meta">
          <span class="cancha-hours">${c.hora_apertura?.substring(0,5)} – ${c.hora_cierre?.substring(0,5)}</span>
          <span class="badge ${c.activo ? 'badge-green' : 'badge-red'}">${c.activo ? 'Activa' : 'Inactiva'}</span>
        </div>
        ${esAdmin ? adminActions(c) : clienteAction(c)}
      </div>
    `).join('');
  }

  // Cliente: botón "Reservar esta cancha" que pre-selecciona la cancha
  function clienteAction(c) {
    return `<a href="reservar.html?cancha=${c.id}" class="btn-primary btn-full" style="margin-top:10px">
      📅 Reservar esta cancha
    </a>`;
  }

  // Admin: editar y habilitar/deshabilitar
  function adminActions(c) {
    return `<div style="display:flex;gap:6px;margin-top:10px">
      <button class="btn-secondary btn-sm" style="flex:1" onclick="editarCancha(${c.id})">✏️ Editar</button>
      <button class="btn-sm ${c.activo ? 'btn-danger' : 'btn-primary'}" style="flex:1"
        onclick="toggleCancha(${c.id}, ${c.activo})">
        ${c.activo ? '🚫 Deshabilitar' : '✅ Habilitar'}
      </button>
    </div>`;
  }

  async function toggleCancha(id, activo) {
    const accion = activo ? 'deshabilitar' : 'habilitar';
    if (!confirm(`¿Deseas ${accion} esta cancha?`)) return;
    try {
      await api.put(`/api/canchas/${id}`, { activo: !activo });
      cargar();
    } catch(err) {
      document.getElementById('alert').textContent = err.message;
      document.getElementById('alert').className = 'alert alert-error';
    }
  }

  function editarCancha(id) {
    window.location.href = `admin.html?editar=${id}`;
  }

  cargar();
</script>
</body>
</html>
