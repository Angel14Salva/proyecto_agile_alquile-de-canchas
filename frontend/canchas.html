<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canchas — Pacific Sport Center</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="app-layout">
  <header class="topbar">
    <a href="dashboard.html" class="topbar-logo">
      <div class="topbar-logo-icon">⚽</div>
      <span class="topbar-name">Pacific Sport Center</span>
    </a>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="topbar-btn" onclick="api.logout()">Salir</button>
    </div>
  </header>

  <div class="main-wrap">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content">
      <div class="page-header">
        <div>
          <div class="page-title">Canchas deportivas</div>
          <div class="page-sub" id="subtitulo">Cargando...</div>
        </div>
        <div style="display:flex;gap:8px">
          <select id="filtroDeporte" onchange="filtrar()">
            <option value="">Todos los deportes</option>
            <option value="futbol">⚽ Fútbol</option>
            <option value="basketball">🏀 Basketball</option>
            <option value="volleyball">🏐 Volleyball</option>
          </select>
          <a href="reservar.html" class="btn-primary">+ Reservar</a>
        </div>
      </div>

      <div class="grid3" id="canchasGrid">
        <div class="loading"><span class="spinner"></span>Cargando canchas...</div>
      </div>
    </main>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script>
  requireAuth();
  renderSidebar('canchas');
  document.getElementById('topbarUser').textContent = `👤 ${api.getUsuario().nombre}`;

  let todasCanchas = [];

  async function cargar() {
    try {
      todasCanchas = await api.get('/api/canchas', false);
      document.getElementById('subtitulo').textContent = `${todasCanchas.length} canchas registradas`;
      renderCanchas(todasCanchas);
    } catch(err) {
      document.getElementById('canchasGrid').innerHTML = `<p style="color:var(--red)">${err.message}</p>`;
    }
  }

  function filtrar() {
    const deporte = document.getElementById('filtroDeporte').value;
    const filtradas = deporte ? todasCanchas.filter(c => c.deporte === deporte) : todasCanchas;
    renderCanchas(filtradas);
  }

  function renderCanchas(canchas) {
    if (canchas.length === 0) {
      document.getElementById('canchasGrid').innerHTML = '<div class="empty"><div class="empty-icon">⚽</div>No hay canchas disponibles</div>';
      return;
    }

    const iconos = { futbol: '⚽', basketball: '🏀', volleyball: '🏐', otro: '🏟️' };

    document.getElementById('canchasGrid').innerHTML = canchas.map(c => `
      <div class="cancha-card" onclick="window.location.href='reservar.html?cancha=${c.id}'">
        <div class="cancha-thumb">${iconos[c.deporte] || '🏟️'}</div>
        <div class="cancha-name">${c.nombre}</div>
        <div class="cancha-price">S/ ${parseFloat(c.precio_hora).toFixed(2)} / hora</div>
        <div class="cancha-meta">
          <span class="cancha-hours">${c.hora_apertura?.substring(0,5)} – ${c.hora_cierre?.substring(0,5)}</span>
          <span class="badge badge-green">Activa</span>
        </div>
      </div>
    `).join('');
  }

  cargar();
</script>
</body>
</html>
