<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recepción — Pacific Sport Center</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="app-layout">
  <header class="topbar">
    <a href="dashboard.html" class="topbar-logo">
      <div class="topbar-logo-icon">⚽</div>
      <span class="topbar-name">Pacific Sport Center</span>
    </a>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <a href="reservar.html" class="topbar-btn">+ Nueva reserva</a>
      <button class="topbar-btn" onclick="api.logout()">Salir</button>
    </div>
  </header>
  <div class="main-wrap">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content">
      <div class="page-header">
        <div>
          <div class="page-title">Panel de recepción</div>
          <div class="page-sub" id="fechaHoy"></div>
        </div>
      </div>
      <div id="alertPago" class="alert hidden"></div>

      <div class="card" id="cardCaja">
        <div class="card-title">🧾 Caja</div>
        <div id="cajaCargando" class="loading"><span class="spinner"></span>Cargando...</div>

        <div id="cajaCerradaBox" style="display:none">
          <p style="font-size:13px;color:var(--gray-text);margin-bottom:12px">No hay una caja abierta. Debes abrir caja antes de registrar pagos.</p>
          <div class="form-group">
            <label>Monto inicial (fondo de caja) S/</label>
            <input type="text" id="cajaMontoInicial" placeholder="0.00" oninput="this.value=this.value.replace(/[^\d.]/g,'')">
          </div>
          <div id="alertCaja" class="alert hidden" style="margin-bottom:12px"></div>
          <button class="btn-primary" onclick="abrirCaja()">🔓 Abrir caja</button>
        </div>

        <div id="cajaAbiertaBox" style="display:none">
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px">
            <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px">
              <div style="font-size:11px;color:var(--gray-muted)">Efectivo en caja</div>
              <div style="font-size:18px;font-weight:700;color:#16a34a" id="cajaEfectivoEnCaja">S/ 0.00</div>
            </div>
            <div style="background:#f8f9fa;border:1px solid var(--gray-border);border-radius:8px;padding:10px">
              <div style="font-size:11px;color:var(--gray-muted)">📱 Digital (verificado)</div>
              <div style="font-size:16px;font-weight:600" id="cajaTotalDigital">S/ 0.00</div>
            </div>
            <div style="background:#f8f9fa;border:1px solid var(--gray-border);border-radius:8px;padding:10px">
              <div style="font-size:11px;color:var(--gray-muted)">Abierta por / desde</div>
              <div style="font-size:12px;font-weight:600" id="cajaInfoApertura">—</div>
            </div>
          </div>
          <details>
            <summary style="cursor:pointer;font-size:13px;color:var(--gray-text)">Cerrar caja</summary>
            <div style="margin-top:12px;padding:12px;background:var(--gray-bg,#f8f9fa);border-radius:8px">
              <div class="form-group">
                <label>Efectivo contado físicamente (S/)</label>
                <input type="text" id="cajaEfectivoContado" placeholder="Cuenta el dinero en caja y coloca el total" oninput="this.value=this.value.replace(/[^\d.]/g,'')">
              </div>
              <div class="form-group">
                <label>Notas (opcional)</label>
                <input type="text" id="cajaNotasCierre" placeholder="Observaciones del cierre">
              </div>
              <div id="alertCierreCaja" class="alert hidden" style="margin-bottom:12px"></div>
              <button class="btn-primary" onclick="cerrarCaja()">🔒 Cerrar caja</button>
            </div>
          </details>
        </div>
      </div>

      <div class="card">
        <div class="card-title">🏢 Check-in</div>
        <div class="form-group">
          <label>Buscar por nombre, DNI, email o código</label>
          <div class="input-group">
            <input type="text" id="checkinQ" placeholder="Ej: RES-2026-019, Juan Pérez..." onkeydown="if(event.key==='Enter')buscarCheckIn()">
            <button class="btn-primary" onclick="buscarCheckIn()">Buscar</button>
          </div>
        </div>
        <div id="checkinResultados"></div>
        <div id="checkinDetalle" style="display:none;margin-top:16px;padding:16px;background:var(--gray-bg);border-radius:8px;border:1px solid var(--gray-border)">
          <div id="checkinInfo"></div>
          <div id="checkinAcciones" style="margin-top:12px"></div>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script>
  requireAuth();
  requireRole('admin', 'recepcionista');
  renderSidebar('recepcion');
  document.getElementById('topbarUser').textContent = `👤 ${api.getUsuario().nombre}`;
  const hoy = new Date();
  document.getElementById('fechaHoy').textContent = hoy.toLocaleDateString('es-PE', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  let reservaCheckIn = null;

  async function cargarEstadoCaja() {
    document.getElementById('cajaCargando').style.display = 'block';
    document.getElementById('cajaCerradaBox').style.display = 'none';
    document.getElementById('cajaAbiertaBox').style.display = 'none';
    try {
      const estado = await api.get('/api/caja/estado');
      document.getElementById('cajaCargando').style.display = 'none';
      if (!estado.abierta) {
        document.getElementById('cajaCerradaBox').style.display = 'block';
        return;
      }
      const c = estado.caja;
      document.getElementById('cajaAbiertaBox').style.display = 'block';
      document.getElementById('cajaEfectivoEnCaja').textContent = 'S/ ' + c.efectivo_en_caja.toFixed(2);
      document.getElementById('cajaTotalDigital').textContent = 'S/ ' + (c.totales.yape + c.totales.plin + c.totales.transferencia + c.totales.tarjeta).toFixed(2);
      const fecha = new Date(c.abierta_at).toLocaleString('es-PE', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
      document.getElementById('cajaInfoApertura').textContent = c.abierta_por + ' · ' + fecha;
    } catch (err) {
      document.getElementById('cajaCargando').style.display = 'none';
      document.getElementById('cajaCerradaBox').style.display = 'block';
    }
  }

  async function abrirCaja() {
    const monto = document.getElementById('cajaMontoInicial').value;
    const alerta = document.getElementById('alertCaja');
    if (monto === '' || isNaN(parseFloat(monto))) {
      alerta.textContent = 'Ingresa un monto inicial válido'; alerta.className = 'alert alert-error'; return;
    }
    try {
      await api.post('/api/caja/abrir', { monto_inicial: parseFloat(monto) });
      document.getElementById('cajaMontoInicial').value = '';
      alerta.className = 'alert hidden';
      cargarEstadoCaja();
    } catch (err) {
      alerta.textContent = err.message; alerta.className = 'alert alert-error';
    }
  }

  async function cerrarCaja() {
    const contado = document.getElementById('cajaEfectivoContado').value;
    const notas = document.getElementById('cajaNotasCierre').value;
    const alerta = document.getElementById('alertCierreCaja');
    if (contado === '' || isNaN(parseFloat(contado))) {
      alerta.textContent = 'Ingresa el efectivo contado'; alerta.className = 'alert alert-error'; return;
    }
    try {
      const resp = await api.post('/api/caja/cerrar', { efectivo_contado: parseFloat(contado), notas: notas || null });
      const r = resp.resumen;
      const difTxt = r.diferencia === 0 ? 'Cuadre exacto ✅' : (r.diferencia > 0 ? `Sobrante: S/ ${r.diferencia.toFixed(2)}` : `Faltante: S/ ${Math.abs(r.diferencia).toFixed(2)}`);
      alert(`Caja cerrada.\nEfectivo esperado: S/ ${r.efectivo_esperado.toFixed(2)}\nEfectivo contado: S/ ${r.efectivo_contado.toFixed(2)}\n${difTxt}`);
      document.getElementById('cajaEfectivoContado').value = '';
      document.getElementById('cajaNotasCierre').value = '';
      alerta.className = 'alert hidden';
      cargarEstadoCaja();
    } catch (err) {
      alerta.textContent = err.message; alerta.className = 'alert alert-error';
    }
  }
  cargarEstadoCaja();

  async function buscarCheckIn() {
    const q = document.getElementById('checkinQ').value.trim();
    if (!q) return;
    const div = document.getElementById('checkinResultados');
    document.getElementById('checkinDetalle').style.display = 'none';
    div.innerHTML = '<div class="loading"><span class="spinner"></span>Buscando...</div>';
    try {
      const results = await api.get(`/api/recepcion/check-in?q=${encodeURIComponent(q)}`);
      if (results.length === 1) { mostrarCheckIn(results[0]); div.innerHTML = ''; return; }
      div.innerHTML = results.map((r,i) => `
        <button type="button" class="btn-secondary btn-full" style="text-align:left;margin-top:8px;padding:10px" onclick="mostrarCheckInDesdeLista(${i})">
          <strong>${r.codigo}</strong> · ${r.cliente_nombre} · ${String(r.fecha).substring(0,10)} · ${r.pago_estado}
        </button>`).join('');
      window._checkinLista = results;
    } catch(err) { div.innerHTML = `<p style="color:var(--red);font-size:13px">${err.message}</p>`; }
  }

  function mostrarCheckInDesdeLista(i) { mostrarCheckIn(window._checkinLista[i]); }

  function mostrarCheckIn(r) {
    reservaCheckIn = r;
    document.getElementById('checkinDetalle').style.display = 'block';

    const reservaFechaHora = new Date(String(r.fecha).substring(0, 10) + 'T' + String(r.hora_inicio).substring(0, 5));
    const ahora = new Date();
    const haPasado = reservaFechaHora < ahora;

    let alertTimeHtml = '';
    if (haPasado) {
      alertTimeHtml = `<div style="background:#feebee;color:#c62828;border:1px solid #ffcdd2;padding:8px 12px;border-radius:6px;margin-top:10px;font-weight:bold;font-size:12px;display:inline-block">⚠️ La reserva ya pasó con respecto a la hora de consulta</div>`;
    } else {
      alertTimeHtml = `<div style="background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9;padding:8px 12px;border-radius:6px;margin-top:10px;font-weight:bold;font-size:12px;display:inline-block">✅ Esta reserva está vigente / próxima</div>`;
    }

    document.getElementById('checkinInfo').innerHTML = `
      <strong>${r.codigo}</strong> · ${r.cancha_nombre}<br>
      Cliente: ${r.cliente_nombre} · ${String(r.fecha).substring(0,10)} ${String(r.hora_inicio).substring(0,5)}<br>
      Total: S/ ${parseFloat(r.precio_hora).toFixed(2)} · Pagado: S/ ${parseFloat(r.pago_monto||0).toFixed(2)} ·
      Estado pago: <strong>${r.pago_estado}</strong>${r.saldo_pendiente > 0 ? ` · Saldo: S/ ${r.saldo_pendiente.toFixed(2)}` : ''}<br>
      ${alertTimeHtml}`;

    document.getElementById('checkinAcciones').innerHTML = '';
  }

  async function confirmarIngreso(id) {
    try {
      await api.post(`/api/recepcion/check-in/${id}/confirmar`, {});
      document.getElementById('alertPago').textContent = '✅ Ingreso confirmado';
      document.getElementById('alertPago').className = 'alert alert-success';
      buscarCheckIn();
    } catch(err) {
      document.getElementById('alertPago').textContent = err.message;
      document.getElementById('alertPago').className = 'alert alert-error';
    }
  }

  function cobrarSaldo(id, monto) {
    const acc = document.getElementById('checkinAcciones');
    acc.innerHTML = `
      <div style="background:white;border:1px solid var(--gray-border);border-radius:8px;padding:12px">
        <p style="font-size:12px;margin-bottom:8px">Cobrar saldo pendiente: <strong>S/ ${monto.toFixed(2)}</strong></p>
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <select id="saldoMetodo" onchange="document.getElementById('saldoReferencia').style.display=['yape','plin','transferencia'].includes(this.value)?'block':'none'" style="flex:1">
            <option value="efectivo">💵 Efectivo</option>
            <option value="tarjeta">💳 Tarjeta</option>
            <option value="yape">💚 Yape</option>
            <option value="plin">💙 Plin</option>
            <option value="transferencia">🏦 Transferencia</option>
          </select>
        </div>
        <input type="text" id="saldoReferencia" placeholder="N° operación" style="display:none;width:100%;margin-bottom:8px">
        <div id="alertSaldo" class="alert hidden" style="margin-bottom:8px"></div>
        <button class="btn-primary" onclick="confirmarCobroSaldo(${id}, ${monto})">💵 Cobrar saldo</button>
      </div>`;
  }

  async function confirmarCobroSaldo(id, monto) {
    const metodo = document.getElementById('saldoMetodo').value;
    const referencia = document.getElementById('saldoReferencia').value.trim();
    const alerta = document.getElementById('alertSaldo');
    try {
      await api.post('/api/pagos', {
        reserva_id: id, metodo, monto, referencia: referencia || null,
        tipo_comprobante: 'boleta', es_saldo: true
      });
      document.getElementById('alertPago').textContent = '✅ Saldo cobrado correctamente';
      document.getElementById('alertPago').className = 'alert alert-success';
      cargarEstadoCaja();
      buscarCheckIn();
    } catch(err) { alerta.textContent = err.message; alerta.className = 'alert alert-error'; }
  }</script>
</body>
</html>
