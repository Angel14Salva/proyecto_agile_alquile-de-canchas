<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancelar reserva — Pacific Sport Center</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="app-layout">
  <header class="topbar">
    <a href="dashboard.html" class="topbar-logo">
      <div class="topbar-logo-icon">⚽</div>
      <span class="topbar-name">Pacific Sport Center</span>
    </a>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="topbar-btn" onclick="api.logout()">Salir</button>
    </div>
  </header>
  <div class="main-wrap">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content">
      <div class="page-header">
        <div>
          <div class="page-title">Cancelar reserva</div>
          <div class="page-sub">Cancela tus reservas con más de 2 horas de anticipación y obtén un cupón de reembolso.</div>
        </div>
      </div>
      <div id="alert" class="alert hidden" style="margin-bottom:16px"></div>
      <div class="card">
        <div class="card-title">Reservas disponibles para cancelar</div>
        <div id="tablaReservas"><div class="loading"><span class="spinner"></span>Cargando reservas...</div></div>
      </div>
    </main>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script>
  requireAuth();
  requireRole('cliente');
  renderSidebar('cancelar-reserva-cliente');
  document.getElementById('topbarUser').textContent = `👤 ${api.getUsuario().nombre}`;

  let reservas = [];

  async function cargar() {
    try {
      const todas = await api.get('/api/reservas');
      
      const ahora = new Date();
      // Filtrar: solo pendientes/confirmadas que comiencen al menos 2 horas en el futuro
      reservas = todas.filter(r => {
        if (r.estado !== 'pendiente' && r.estado !== 'confirmada') return false;
        const fechaStr = r.fecha?.substring(0,10);
        const horaStr = r.hora_inicio?.substring(0,5);
        const fechaHora = new Date(`${fechaStr}T${horaStr}:00`);
        const diffHoras = (fechaHora - ahora) / (1000 * 60 * 60);
        return diffHoras >= 2;
      });
      
      renderTabla();
    } catch(err) {
      document.getElementById('tablaReservas').innerHTML = `<p style="color:var(--red)">${err.message}</p>`;
    }
  }

  function renderTabla() {
    if (reservas.length === 0) {
      document.getElementById('tablaReservas').innerHTML = '<div class="empty"><div class="empty-icon">🎉</div>No tienes reservas cancelables (a más de 2 horas en el futuro)</div>';
      return;
    }

    document.getElementById('tablaReservas').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Cancha</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Monto Pagado</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody>
          ${reservas.map(r => `
            <tr>
              <td><code style="font-size:11px;background:#f5f5f5;padding:2px 6px;border-radius:4px">${r.codigo||'—'}</code></td>
              <td>${r.cancha_nombre}</td>
              <td>${r.fecha?.substring(0,10)}</td>
              <td>${r.hora_inicio?.substring(0,5)} – ${r.hora_fin?.substring(0,5)}</td>
              <td><strong>S/ ${parseFloat(r.precio_hora||0).toFixed(2)}</strong></td>
              <td>
                <button class="btn-danger btn-sm" onclick="cancelarReserva(${r.id}, '${r.codigo}', ${parseFloat(r.precio_hora||0)})">
                  ❌ Cancelar y Reembolsar
                </button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  async function cancelarReserva(id, codigo, monto) {
    const msg = `¿Estás seguro de que deseas cancelar la reserva ${codigo}? Se generará un cupón de reembolso por S/ ${monto.toFixed(2)}.`;
    if (!confirm(msg)) return;

    const alertEl = document.getElementById('alert');
    alertEl.className = 'alert hidden';

    try {
      const res = await api.post(`/api/reservas/${id}/cancelar-linea`, {});
      
      let successMsg = `✅ Reserva ${codigo} cancelada con éxito.`;
      if (res.cupon && res.cupon.codigo) {
        successMsg += ` Tu cupón de reembolso de **S/ ${parseFloat(res.cupon.saldo).toFixed(2)}** ha sido generado: **${res.cupon.codigo}**`;
      }
      
      alertEl.innerHTML = successMsg;
      alertEl.className = 'alert alert-success';
      cargar();
    } catch (err) {
      alertEl.textContent = err.message || 'Error al cancelar la reserva';
      alertEl.className = 'alert alert-error';
    }
  }

  cargar();
</script>
</body>
</html>
