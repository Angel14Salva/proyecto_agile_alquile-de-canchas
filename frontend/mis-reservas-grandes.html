<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis reservas grandes — Pacific Sport Center</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="app-layout">
  <header class="topbar">
    <a href="dashboard.html" class="topbar-logo">
      <div class="topbar-logo-icon">⚽</div>
      <span class="topbar-name">Pacific Sport Center</span>
    </a>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="topbar-btn" onclick="api.logout()">Salir</button>
    </div>
  </header>
  <div class="main-wrap">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content">
      <div class="page-header">
        <div>
          <div class="page-title">🏟️ Mis reservas grandes</div>
          <div class="page-sub">Eventos y campeonatos</div>
        </div>
        <a href="reserva-grande.html" class="btn-primary">+ Nueva reserva grande</a>
      </div>
      <div id="alert" class="alert hidden"></div>
      <div class="card">
        <div id="tablaReservas"><div class="loading"><span class="spinner"></span>Cargando...</div></div>
      </div>
    </main>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script>
  requireAuth();
  renderSidebar('reserva-grande');
  document.getElementById('topbarUser').textContent = `👤 ${api.getUsuario().nombre}`;

  async function cargar() {
    try {
      const reservas = await api.get('/api/reservas-grandes');
      const div = document.getElementById('tablaReservas');
      if (reservas.length === 0) {
        div.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>No hay reservas grandes</div>';
        return;
      }
      const badge = (e) => {
        const m = { confirmada:'badge-green', pendiente:'badge-amber', cancelada:'badge-red' };
        return `<span class="badge ${m[e]||'badge-gray'}">${e}</span>`;
      };
      const turnos = { manana:'🌅 Mañana', tarde:'🌇 Tarde', dia_completo:'☀️ Día completo' };
      div.innerHTML = `<table>
        <thead><tr><th>Código</th><th>Organización</th><th>Fecha</th><th>Turno</th><th>Canchas</th><th>Total</th><th>Estado</th><th>Acción</th></tr></thead>
        <tbody>
          ${reservas.map(r => `<tr>
            <td><code style="font-size:11px;background:#f5f5f5;padding:2px 6px;border-radius:4px">${r.codigo}</code></td>
            <td><strong>${r.nombre_org}</strong>${r.ruc ? `<br><span style="font-size:11px;color:var(--gray-muted)">RUC: ${r.ruc}</span>` : ''}</td>
            <td>${r.fecha?.substring(0,10)}</td>
            <td>${turnos[r.turno]||r.turno}<br><span style="font-size:11px;color:var(--gray-muted)">${r.hora_inicio?.substring(0,5)} – ${r.hora_fin?.substring(0,5)}</span></td>
            <td>${r.num_canchas} canchas</td>
            <td><strong>S/ ${parseFloat(r.precio_total).toFixed(2)}</strong></td>
            <td>${badge(r.estado)}</td>
            <td>${r.estado === 'pendiente' ? `<button class="btn-danger btn-sm" onclick="cancelar(${r.id})">Cancelar</button>` : '—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
    } catch(err) {
      document.getElementById('tablaReservas').innerHTML = `<p style="color:var(--red)">${err.message}</p>`;
    }
  }

  async function cancelar(id) {
    if (!confirm('¿Cancelar esta reserva grande?')) return;
    const alerta = document.getElementById('alert');
    try {
      await api.delete(`/api/reservas-grandes/${id}`);
      alerta.textContent = '✅ Reserva grande cancelada';
      alerta.className = 'alert alert-success';
      cargar();
    } catch(err) {
      alerta.textContent = err.message;
      alerta.className = 'alert alert-error';
    }
  }

  cargar();
</script>
</body>
</html>
