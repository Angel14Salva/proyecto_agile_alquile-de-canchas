<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Gerente — Pacific Sport Center</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="app-layout">
  <header class="topbar">
    <a href="dashboard.html" class="topbar-logo">
      <div class="topbar-logo-icon">⚽</div>
      <span class="topbar-name">Pacific Sport Center</span>
    </a>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="topbar-btn" onclick="api.logout()">Salir</button>
    </div>
  </header>

  <div class="main-wrap">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content">

      <!-- Tabs de navegación interna -->
      <div id="tabsBar" style="display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid var(--gray-border);padding-bottom:0">
        <button class="tab-btn active" id="tabUsuariosBtn"  onclick="mostrarTab('usuarios')">👥 Gestión de usuarios</button>
        <button class="tab-btn"        id="tabCanchasBtn"   onclick="mostrarTab('canchas')">⚽ Canchas</button>
        <button class="tab-btn"        id="tabInformesBtn"  onclick="mostrarTab('informes')">📊 Exportar informes</button>
      </div>

      <div id="alert" class="alert hidden"></div>

      <!-- ── TAB: USUARIOS ────────────────────────────────────────── -->
      <div id="tabUsuarios">
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <div class="card-title" style="margin:0">👥 Usuarios del sistema</div>
            <button class="btn-primary btn-sm" onclick="toggleFormUsuario()">+ Nuevo usuario</button>
          </div>

          <div id="formUsuario" style="display:none;margin-bottom:14px;padding:12px;background:var(--gray-bg);border-radius:8px">
            <div class="form-row">
              <div class="form-group"><label>Nombre</label><input type="text" id="uNombre" placeholder="Nombre completo"></div>
              <div class="form-group"><label>Email</label><input type="email" id="uEmail" placeholder="correo@ejemplo.com"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Contraseña</label><input type="password" id="uPassword" placeholder="Mínimo 8 caracteres"></div>
              <div class="form-group"><label>Rol</label>
                <select id="uRol">
                  <option value="cliente">Cliente</option>
                  <option value="recepcionista">Recepcionista</option>
                  <option value="admin">Gerente</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Teléfono</label><input type="text" id="uTelefono" placeholder="999000000"></div>
              <div class="form-group"><label>DNI</label><input type="text" id="uDni" placeholder="12345678"></div>
            </div>
            <button class="btn-primary" onclick="crearUsuario()">Crear usuario</button>
            <button class="btn-secondary" style="margin-left:8px" onclick="toggleFormUsuario()">Cancelar</button>
          </div>

          <div id="listaUsuarios"><div class="loading"><span class="spinner"></span>Cargando...</div></div>
        </div>
      </div>

      <!-- ── TAB: CANCHAS ─────────────────────────────────────────── -->
      <div id="tabCanchas" style="display:none">
        <div class="card">
          <div class="card-title">⚽ Canchas registradas</div>
          <div id="listaCanchas"><div class="loading"><span class="spinner"></span>Cargando...</div></div>
        </div>
      </div>

      <!-- ── TAB: INFORMES ────────────────────────────────────────── -->
      <div id="tabInformes" style="display:none">
        <div class="card">
          <div class="card-title">📊 Exportar reportes</div>
          <div class="form-row" style="margin-top:12px">
            <div class="form-group"><label>Desde</label><input type="date" id="expDesde"></div>
            <div class="form-group"><label>Hasta</label><input type="date" id="expHasta"></div>
          </div>
          <div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap">
            <button class="btn-primary btn-sm" onclick="exportar('pdf')">📄 Exportar PDF</button>
            <button class="btn-secondary btn-sm" onclick="exportar('excel')">📊 Exportar Excel</button>
          </div>
          <div class="form-row" style="margin-top:16px">
            <div class="form-group"><label>Caja inicial del mes (S/)</label><input type="text" id="cajaInicial" oninput="this.value=this.value.replace(/[^\d.]/g,'')"></div>
            <div class="form-group" style="display:flex;align-items:flex-end"><button class="btn-secondary" onclick="guardarCajaInicial()">Guardar caja inicial</button></div>
          </div>
          <div id="historialExport" style="margin-top:16px"><div class="loading"><span class="spinner"></span>Cargando historial...</div></div>
        </div>
      </div>

    </main>
  </div>
</div>

<style>
  .tab-btn { padding:8px 16px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--gray-text);margin-bottom:-2px; }
  .tab-btn.active { border-bottom-color:var(--green);color:var(--green);font-weight:600; }
</style>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script>
  requireAuth();
  requireRole('admin');
  const _hash = window.location.hash.replace('#','');
  const _pageMap = { usuarios: 'admin-usuarios', informes: 'admin-export', canchas: 'admin' };
  renderSidebar(_pageMap[_hash] || 'admin');
  document.getElementById('topbarUser').textContent = `👤 ${api.getUsuario().nombre}`;
  const _fr = document.getElementById('fechaReporte'); if(_fr) _fr.textContent = new Date().toLocaleDateString('es-PE');

  // Abrir tab según hash en URL (ej: admin.html#usuarios)

  let canchasData = [];
  if (_hash) {
    mostrarTab(_hash);
  }
  window.addEventListener('hashchange', () => {
    const h = window.location.hash.replace('#','');
    if (h) {
      mostrarTab(h);
      const pm = { usuarios: 'admin-usuarios', informes: 'admin-export', canchas: 'admin' };
      renderSidebar(pm[h] || 'admin');
    }
  });



  function mostrarTab(tab) {
    ['usuarios','canchas','informes'].forEach(t => {
      document.getElementById(`tab${t.charAt(0).toUpperCase()+t.slice(1)}`).style.display = t === tab ? '' : 'none';
      document.getElementById(`tab${t.charAt(0).toUpperCase()+t.slice(1)}Btn`).classList.toggle('active', t === tab);
    });
    if (tab === 'canchas'  && !canchasData.length) cargarCanchas();
    if (tab === 'informes') { cargarHistorialExport(); setDefaultFechasExport(); }
  }

  function setDefaultFechasExport() {
    const hoy = new Date();
    const inicio = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
    document.getElementById('expDesde').value = inicio.toISOString().split('T')[0];
    document.getElementById('expHasta').value = hoy.toISOString().split('T')[0];
  }

  async function exportar(fmt) {
    const desde = document.getElementById('expDesde').value;
    const hasta = document.getElementById('expHasta').value;
    if (!desde || !hasta) { alert('Seleccione rango de fechas'); return; }
    try {
      await api.download(`/api/reportes/export/${fmt}?desde=${desde}&hasta=${hasta}`);
      cargarHistorialExport();
    } catch(err) {
      document.getElementById('alert').textContent = err.message;
      document.getElementById('alert').className = 'alert alert-error';
    }
  }

  async function guardarCajaInicial() {
    const hoy = new Date();
    try {
      await api.post('/api/reportes/caja-inicial', {
        anio: hoy.getFullYear(), mes: hoy.getMonth() + 1,
        monto: parseFloat(document.getElementById('cajaInicial').value || 0)
      });
      document.getElementById('alert').textContent = '✅ Caja inicial registrada';
      document.getElementById('alert').className = 'alert alert-success';
    } catch(err) {
      document.getElementById('alert').textContent = err.message;
      document.getElementById('alert').className = 'alert alert-error';
    }
  }

  async function cargarHistorialExport() {
    try {
      const rows = await api.get('/api/reportes/historial');
      document.getElementById('historialExport').innerHTML = rows.length ? `
        <div class="card-title" style="font-size:13px">Últimos informes</div>
        <table><thead><tr><th>Archivo</th><th>Formato</th><th>Rango</th><th>Fecha</th></tr></thead>
        <tbody>${rows.map(r => `<tr><td>${r.nombre}</td><td>${r.formato}</td><td>${r.desde} – ${r.hasta}</td><td>${new Date(r.created_at).toLocaleString('es-PE')}</td></tr>`).join('')}
        </tbody></table>` : '<p style="color:var(--gray-muted);font-size:13px">Sin exportaciones previas</p>';
    } catch(err) {
      document.getElementById('historialExport').innerHTML = `<p style="color:var(--red)">${err.message}</p>`;
    }
  }

  async function toggleUsuario(id, activo) {
    try {
      await api.put(`/api/usuarios/${id}`, { activo: !activo });
      cargarUsuarios();
    } catch(err) {
      document.getElementById('alert').textContent = err.message;
      document.getElementById('alert').className = 'alert alert-error';
    }
  }

  function toggleFormUsuario() {
    const f = document.getElementById('formUsuario');
    f.style.display = f.style.display === 'none' ? 'block' : 'none';
  }

  async function crearUsuario() {
    const alerta = document.getElementById('alert');
    try {
      await api.post('/api/usuarios', {
        nombre:   document.getElementById('uNombre').value,
        email:    document.getElementById('uEmail').value,
        password: document.getElementById('uPassword').value,
        rol:      document.getElementById('uRol').value,
        telefono: document.getElementById('uTelefono').value || null,
        dni:      document.getElementById('uDni').value || null,
      });
      alerta.textContent = '✅ Usuario creado correctamente';
      alerta.className = 'alert alert-success';
      toggleFormUsuario();
      cargarUsuarios();
    } catch(err) {
      alerta.textContent = err.message;
      alerta.className = 'alert alert-error';
    }
  }

  async function cargarUsuarios() {
    try {
      const usuarios = await api.get('/api/usuarios');
      const rolLabel = { admin:'Gerente', recepcionista:'Recepcionista', cliente:'Cliente' };
      const badgeRol = { admin:'badge-blue', recepcionista:'badge-amber', cliente:'badge-gray' };
      document.getElementById('listaUsuarios').innerHTML =
        `<table>
          <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Estado</th><th>Acción</th></tr></thead>
          <tbody>
            ${usuarios.map(u => `<tr>
              <td><strong>${u.nombre}</strong></td>
              <td style="font-size:12px;color:var(--gray-text)">${u.email}</td>
              <td><span class="badge ${badgeRol[u.rol]||'badge-gray'}">${rolLabel[u.rol]||u.rol}</span></td>
              <td><span class="badge ${u.activo?'badge-green':'badge-red'}">${u.activo?'Activo':'Inactivo'}</span></td>
              <td><button class="btn-sm ${u.activo?'btn-danger':'btn-primary'}" onclick="toggleUsuario(${u.id}, ${u.activo})">${u.activo?'Desactivar':'Activar'}</button></td>
            </tr>`).join('')}
          </tbody>
         </table>`;
    } catch(err) {
      document.getElementById('listaUsuarios').innerHTML = `<p style="color:var(--red)">${err.message}</p>`;
    }
  }

  async function cargarCanchas() {
    try {
      canchasData = await api.get('/api/canchas/admin/list');
      const iconos = { futbol:'⚽', basketball:'🏀', volleyball:'🏐' };
      document.getElementById('listaCanchas').innerHTML =
        `<table>
          <thead><tr><th>Cancha</th><th>Precio/hr</th><th>Horario</th><th>Estado</th><th>Acciones</th></tr></thead>
          <tbody>
            ${canchasData.map(c => `<tr>
              <td>${iconos[c.deporte]||'🏟️'} <strong>${c.nombre}</strong></td>
              <td>S/ ${parseFloat(c.precio_hora).toFixed(2)}</td>
              <td style="font-size:12px">${c.hora_apertura?.substring(0,5)} – ${c.hora_cierre?.substring(0,5)}</td>
              <td><span class="badge ${c.activo?'badge-green':'badge-red'}">${c.activo?'Activa':'Inactiva'}</span></td>
              <td>
                <button class="btn-secondary btn-sm" onclick="editarCanchaInline(${c.id})">Editar</button>
                <button class="btn-sm ${c.activo?'btn-danger':'btn-primary'}" onclick="toggleCancha(${c.id},${c.activo})">${c.activo?'Deshabilitar':'Habilitar'}</button>
              </td>
            </tr>`).join('')}
          </tbody>
         </table>`;
    } catch(err) {
      document.getElementById('listaCanchas').innerHTML = `<p style="color:var(--red)">${err.message}</p>`;
    }
  }

  async function toggleCancha(id, activo) {
    if (!confirm(`¿Deseas ${activo?'deshabilitar':'habilitar'} esta cancha?`)) return;
    try {
      await api.put(`/api/canchas/${id}`, { activo: !activo });
      cargarCanchas();
    } catch(err) {
      document.getElementById('alert').textContent = err.message;
      document.getElementById('alert').className = 'alert alert-error';
    }
  }

  function editarCanchaInline(id) {
    const c = canchasData.find(x => x.id === id);
    if (!c) return;
    const nombre = prompt('Nombre:', c.nombre);
    if (nombre === null) return;
    const precio = prompt('Precio por hora (S/):', c.precio_hora);
    if (precio === null) return;
    const apertura = prompt('Hora apertura (HH:MM):', c.hora_apertura?.substring(0,5));
    if (apertura === null) return;
    const cierre = prompt('Hora cierre (HH:MM):', c.hora_cierre?.substring(0,5));
    if (cierre === null) return;
    api.put(`/api/canchas/${id}`, {
      nombre, precio_hora: parseFloat(precio),
      hora_apertura: apertura + ':00', hora_cierre: cierre + ':00'
    }).then(() => cargarCanchas()).catch(err => {
      document.getElementById('alert').textContent = err.message;
      document.getElementById('alert').className = 'alert alert-error';
    });
  }

  async function exportarReservasCSV() {
    try {
      const fecha = new Date().toISOString().split('T')[0];
      const reservas = await api.get(`/api/reservas?fecha=${fecha}`);
      const rows = [['ID','Código','Cancha','Cliente','Fecha','Hora inicio','Hora fin','Estado','Pago']];
      reservas.forEach(r => rows.push([r.id, r.codigo||'', r.cancha_nombre, r.cliente_nombre,
        r.fecha, r.hora_inicio?.substring(0,5), r.hora_fin?.substring(0,5), r.estado, r.pago_estado||'pendiente']));
      descargarCSV(rows, `reservas-${fecha}.csv`);
    } catch(err) {
      document.getElementById('alert').textContent = err.message;
      document.getElementById('alert').className = 'alert alert-error';
    }
  }

  function exportarCanchasCSV() {
    const rows = [['ID','Nombre','Deporte','Precio/hora','Apertura','Cierre']];
    canchasData.forEach(c => rows.push([c.id, c.nombre, c.deporte, c.precio_hora,
      c.hora_apertura?.substring(0,5), c.hora_cierre?.substring(0,5)]));
    descargarCSV(rows, 'canchas.csv');
  }

  function descargarCSV(rows, filename) {
    const csv  = '\uFEFF' + rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  }

  cargarUsuarios();
</script>
</body>
</html>
