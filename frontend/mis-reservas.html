<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis reservas — Pacific Sport Center</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="app-layout">
  <header class="topbar">
    <a href="dashboard.html" class="topbar-logo">
      <div class="topbar-logo-icon">⚽</div>
      <span class="topbar-name">Pacific Sport Center</span>
    </a>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="topbar-btn" onclick="api.logout()">Salir</button>
    </div>
  </header>

  <div class="main-wrap">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content">
      <div class="page-header">
        <div>
          <div class="page-title">Mis reservas</div>
          <div class="page-sub">Historial completo</div>
        </div>
        <a href="reservar.html" class="btn-primary">+ Nueva reserva</a>
      </div>

      <div id="alert" class="alert hidden"></div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
          <div class="card-title" style="margin:0">Todas mis reservas</div>
          <select id="filtroEstado" onchange="filtrar()">
            <option value="">Todos los estados</option>
            <option value="pendiente">Pendiente</option>
            <option value="confirmada">Confirmada</option>
            <option value="completada">Completada</option>
            <option value="cancelada">Cancelada</option>
          </select>
        </div>
        <div id="tablaReservas"><div class="loading"><span class="spinner"></span>Cargando...</div></div>
      </div>
    </main>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script>
  requireAuth();
  renderSidebar('mis-reservas');
  document.getElementById('topbarUser').textContent = `👤 ${api.getUsuario().nombre}`;

  let reservas = [];

  async function cargar() {
    try {
      reservas = await api.get('/api/reservas');
      filtrar();
    } catch(err) {
      document.getElementById('tablaReservas').innerHTML = `<p style="color:var(--red)">${err.message}</p>`;
    }
  }

  function filtrar() {
    const estado = document.getElementById('filtroEstado').value;
    const filtradas = estado ? reservas.filter(r => r.estado === estado) : reservas;
    renderTabla(filtradas);
  }

  function renderTabla(lista) {
    if (lista.length === 0) {
      document.getElementById('tablaReservas').innerHTML = '<div class="empty"><div class="empty-icon">📭</div>No hay reservas</div>';
      return;
    }

    const badgeEstado = (e) => {
      const m = { confirmada:'badge-green', pendiente:'badge-amber', cancelada:'badge-red', completada:'badge-gray' };
      return `<span class="badge ${m[e]||'badge-gray'}">${e}</span>`;
    };
    const badgePago = (e) => {
      const m = { pagado:'badge-green', pendiente:'badge-amber', reembolsado:'badge-blue' };
      return e ? `<span class="badge ${m[e]||'badge-gray'}">${e}</span>` : '<span class="badge badge-amber">Pendiente</span>';
    };

    document.getElementById('tablaReservas').innerHTML = `
      <table>
        <thead>
          <tr><th>Código</th><th>Cancha</th><th>Fecha</th><th>Hora</th><th>Estado</th><th>Pago</th><th>Monto</th><th></th></tr>
        </thead>
        <tbody>
          ${lista.map(r => `
            <tr>
              <td><code style="font-size:11px;background:#f5f5f5;padding:2px 6px;border-radius:4px">${r.codigo || '—'}</code></td>
              <td>${r.cancha_nombre}</td>
              <td>${r.fecha}</td>
              <td>${r.hora_inicio?.substring(0,5)} – ${r.hora_fin?.substring(0,5)}</td>
              <td>${badgeEstado(r.estado)}</td>
              <td>${badgePago(r.pago_estado)}</td>
              <td><strong>S/ ${parseFloat(r.precio_hora||0).toFixed(2)}</strong></td>
              <td>
                ${(r.estado === 'pendiente' || r.estado === 'confirmada')
                  ? `<button class="btn-danger" onclick="cancelar(${r.id})">Cancelar</button>`
                  : '—'}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  async function cancelar(id) {
    if (!confirm('¿Cancelar esta reserva? Solo puedes cancelar con al menos 2 horas de anticipación.')) return;
    const alert = document.getElementById('alert');
    try {
      await api.delete(`/api/reservas/${id}`);
      alert.textContent = 'Reserva cancelada correctamente';
      alert.className = 'alert alert-success';
      cargar();
    } catch(err) {
      alert.textContent = err.message;
      alert.className = 'alert alert-error';
    }
  }

  cargar();
</script>
</body>
</html>
