<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancelar reserva — Pacific Sport Center</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="app-layout">
  <header class="topbar">
    <a href="dashboard.html" class="topbar-logo">
      <div class="topbar-logo-icon">⚽</div>
      <span class="topbar-name">Pacific Sport Center</span>
    </a>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="topbar-btn" onclick="api.logout()">Salir</button>
    </div>
  </header>
  <div class="main-wrap">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content">
      <div class="page-header">
        <div>
          <div class="page-title">Cancelar reserva</div>
          <div class="page-sub">Busque la reserva y confirme la devolución si corresponde</div>
        </div>
      </div>

      <div id="alert" class="alert hidden"></div>

      <div class="card">
        <div class="card-title">🔍 Buscar reserva</div>
        <div class="form-group">
          <label>ID, código, nombre, DNI o email</label>
          <div class="input-group">
            <input type="text" id="buscarQ" placeholder="Ej: RES-2026-019, Juan Pérez, 12345678..." onkeydown="if(event.key==='Enter')buscar()">
            <button class="btn-primary" onclick="buscar()">Buscar</button>
          </div>
        </div>
        <div id="listaResultados"></div>
      </div>

      <div class="card" id="cardDetalle" style="display:none">
        <div class="card-title">📋 Detalle de la reserva</div>
        <div id="detalleReserva" style="background:var(--gray-bg,#f8f9fa);border:1px solid var(--gray-border);border-radius:8px;padding:16px;font-size:13px;margin-bottom:16px"></div>

        <div id="bloqueReembolso" style="display:none">
          <div class="card-title" style="margin-top:8px">💸 Reembolso</div>
          <p style="font-size:13px;color:var(--gray-text);margin-bottom:12px">
            Esta reserva tiene pago registrado. Confirme que el reembolso fue entregado al cliente antes de cancelar.
          </p>
          <div class="form-group">
            <label>Método de reembolso entregado</label>
            <select id="reembolsoMetodo">
              <option value="">— Seleccione —</option>
              <option value="efectivo">💵 Efectivo</option>
              <option value="transferencia">🏦 Transferencia</option>
            </select>
          </div>
          <div class="form-group">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:400">
              <input type="checkbox" id="reembolsoConfirmado">
              Confirmo que el reembolso de <strong id="montoReembolsoLabel">S/ 0.00</strong> fue entregado al cliente
            </label>
          </div>
        </div>

        <div style="display:flex;gap:10px;margin-top:8px">
          <button class="btn-danger" id="btnCancelar" onclick="confirmarCancelacion()">Cancelar reserva</button>
          <button class="btn-secondary" onclick="limpiarSeleccion()">Limpiar</button>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script>
  requireAuth();
  requireRole('admin', 'recepcionista');
  renderSidebar('cancelar-reserva');
  document.getElementById('topbarUser').textContent = `👤 ${api.getUsuario().nombre}`;

  let reservaSeleccionada = null;
  let resultadosBusqueda = [];

  function labelPago(tipo) {
    const m = { completo: 'Pago completo', adelanto: 'Adelanto (50%)', sin_pago: 'Sin pago', parcial: 'Pago parcial' };
    return m[tipo] || tipo;
  }

  function badgeEstado(estado) {
    const m = { confirmada: 'badge-green', pendiente: 'badge-amber', cancelada: 'badge-red', completada: 'badge-gray' };
    return `<span class="badge ${m[estado] || 'badge-gray'}">${estado}</span>`;
  }

  function mostrarAlerta(msg, tipo) {
    const alerta = document.getElementById('alert');
    alerta.textContent = msg;
    alerta.className = `alert alert-${tipo}`;
  }

  async function buscar() {
    const q = document.getElementById('buscarQ').value.trim();
    const lista = document.getElementById('listaResultados');
    const cardDetalle = document.getElementById('cardDetalle');
    cardDetalle.style.display = 'none';
    reservaSeleccionada = null;

    if (!q) {
      mostrarAlerta('Ingrese un criterio de búsqueda', 'error');
      return;
    }

    lista.innerHTML = '<div class="loading"><span class="spinner"></span>Buscando...</div>';
    document.getElementById('alert').className = 'alert hidden';

    try {
      const resultados = await api.get(`/api/reservas/buscar-cancelacion?q=${encodeURIComponent(q)}`);
      resultadosBusqueda = resultados;
      if (resultados.length === 1) {
        seleccionarReserva(resultados[0]);
        lista.innerHTML = '';
        return;
      }
      lista.innerHTML = `
        <p style="font-size:12px;color:var(--gray-muted);margin:12px 0 8px">${resultados.length} reservas encontradas — seleccione una:</p>
        ${resultados.map((r, i) => `
          <button type="button" class="btn-secondary btn-full" style="text-align:left;margin-bottom:8px;padding:12px"
            onclick="seleccionarPorIndice(${i})">
            <strong>${r.codigo || r.id}</strong> · ${r.cliente_nombre}<br>
            <span style="font-size:12px;color:var(--gray-text)">${r.cancha_nombre} · ${String(r.fecha).substring(0,10)} · ${badgeEstado(r.estado)}</span>
          </button>`).join('')}`;
    } catch (err) {
      lista.innerHTML = `<p style="color:var(--red);font-size:13px;margin-top:8px">${err.message}</p>`;
    }
  }

  function seleccionarPorIndice(i) {
    seleccionarReserva(resultadosBusqueda[i]);
  }

  function seleccionarReserva(r) {
    reservaSeleccionada = r;
    const cardDetalle = document.getElementById('cardDetalle');
    const bloqueReembolso = document.getElementById('bloqueReembolso');
    const btnCancelar = document.getElementById('btnCancelar');

    document.getElementById('detalleReserva').innerHTML = `
      <div style="display:grid;gap:6px">
        <div><strong>Código:</strong> ${r.codigo || '—'} &nbsp; <strong>ID:</strong> ${r.id}</div>
        <div><strong>Cancha:</strong> ${r.cancha_nombre}</div>
        <div><strong>Fecha:</strong> ${String(r.fecha).substring(0,10)} &nbsp; <strong>Horario:</strong> ${String(r.hora_inicio).substring(0,5)} – ${String(r.hora_fin).substring(0,5)}</div>
        <div><strong>Cliente:</strong> ${r.cliente_nombre}${r.cliente_dni ? ' · DNI: ' + r.cliente_dni : ''}</div>
        <div><strong>Estado reserva:</strong> ${badgeEstado(r.estado)} &nbsp; <strong>Origen:</strong> ${r.origen === 'linea' ? 'En línea' : 'Recepción'}</div>
        <div><strong>Estado de pago:</strong> ${labelPago(r.pago_tipo)}${r.pago_monto ? ` · S/ ${parseFloat(r.pago_monto).toFixed(2)} pagado` : ''}</div>
        <div><strong>Precio total:</strong> S/ ${parseFloat(r.precio_hora || 0).toFixed(2)}</div>
        ${r.cancelado_at ? `<div style="margin-top:6px;color:var(--red)"><strong>Cancelada por:</strong> ${r.cancelado_por_nombre || '—'} el ${new Date(r.cancelado_at).toLocaleString('es-PE')}</div>` : ''}
      </div>`;

    if (r.estado === 'cancelada') {
      bloqueReembolso.style.display = 'none';
      btnCancelar.disabled = true;
      btnCancelar.textContent = 'Reserva ya cancelada';
    } else {
      btnCancelar.disabled = false;
      btnCancelar.textContent = 'Cancelar reserva';
      if (r.requiere_reembolso) {
        bloqueReembolso.style.display = 'block';
        document.getElementById('montoReembolsoLabel').textContent = `S/ ${parseFloat(r.monto_reembolsar).toFixed(2)}`;
        document.getElementById('reembolsoConfirmado').checked = false;
        document.getElementById('reembolsoMetodo').value = '';
      } else {
        bloqueReembolso.style.display = 'none';
      }
    }

    cardDetalle.style.display = 'block';
    cardDetalle.scrollIntoView({ behavior: 'smooth' });
  }

  function limpiarSeleccion() {
    reservaSeleccionada = null;
    document.getElementById('cardDetalle').style.display = 'none';
    document.getElementById('listaResultados').innerHTML = '';
    document.getElementById('buscarQ').value = '';
    document.getElementById('alert').className = 'alert hidden';
  }

  async function confirmarCancelacion() {
    if (!reservaSeleccionada) return;

    const r = reservaSeleccionada;
    if (r.estado === 'cancelada') {
      mostrarAlerta('Esta reserva ya fue cancelada', 'error');
      return;
    }

    const payload = { reembolso_confirmado: false };

    if (r.requiere_reembolso) {
      payload.reembolso_confirmado = document.getElementById('reembolsoConfirmado').checked;
      payload.reembolso_metodo = document.getElementById('reembolsoMetodo').value;
      if (!payload.reembolso_confirmado) {
        mostrarAlerta('Debe confirmar que el reembolso fue entregado al cliente', 'error');
        return;
      }
      if (!payload.reembolso_metodo) {
        mostrarAlerta('Seleccione el método de reembolso entregado', 'error');
        return;
      }
    }

    const msg = r.requiere_reembolso
      ? `¿Cancelar la reserva ${r.codigo} y registrar reembolso de S/ ${parseFloat(r.monto_reembolsar).toFixed(2)}?`
      : `¿Cancelar la reserva ${r.codigo}?`;

    if (!confirm(msg)) return;

    try {
      const resp = await api.post(`/api/reservas/${r.id}/cancelar-recepcion`, payload);
      let msgOk = '✅ Reserva cancelada. El horario quedó liberado.';
      if (resp.nota_credito) {
        msgOk += ` Nota de crédito ${resp.nota_credito.numero} generada (ref. comprobante ${resp.nota_credito.comprobante_original}).`;
      }
      mostrarAlerta(msgOk, 'success');
      seleccionarReserva(resp.reserva);
    } catch (err) {
      mostrarAlerta(err.message, 'error');
    }
  }
</script>
</body>
</html>
